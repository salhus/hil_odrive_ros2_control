controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    motor_effort_controller:
      type: effort_controllers/JointGroupEffortController

    pto_effort_controller:
      type: effort_controllers/JointGroupEffortController

joint_state_broadcaster:
  ros__parameters:
    custom_state_interfaces:
      - electrical_power
      - mechanical_power

motor_effort_controller:
  ros__parameters:
    joints:
      - motor_joint

pto_effort_controller:
  ros__parameters:
    joints:
      - pto_joint
